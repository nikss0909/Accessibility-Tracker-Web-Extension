services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./accessibility-backend
    restart: unless-stopped
    env_file:
      - ./accessibility-backend/.env.production.example
    environment:
      MONGODB_URI: mongodb://mongo:27017/accessibility_tracker
      CORS_ORIGIN: http://localhost:8080
      JWT_SECRET: local-docker-development-secret-change-before-deploy
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo-data:
